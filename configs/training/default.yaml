name: default
device: auto
num_workers: 4
pin_memory: true
log_every_n_steps: 50
checkpoint:
  save_top_k: 1
  monitor: val_loss
  mode: min
metrics:
  regression: [rmse, mae, ic, r2]
  classification: [accuracy, balanced_accuracy, log_loss, brier]
  sequence_regression: [rmse, mae, ic, directional_accuracy]
  quantile_regression: [pinball, coverage, crps]
